schema_version: 1

context:
  name: pyroll-core
  version: "3.1.4"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pyroll_core-${{ version }}.tar.gz
  sha256: e236538882554b76675162fa3dc730ab6c9eb9683b1b794e367bbc8626a1bace

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=2.0,<3.dev0
    - scipy >=1.13,<2.dev0
    - shapely >=2.0.6,<3.0
    - ezdxf

tests:
  - python:
      imports:
        - pyroll.core
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: PyRoll rolling simulation framework - core library.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://pyroll.readthedocs.io

extra:
  recipe-maintainers:
    - jan-janssen
